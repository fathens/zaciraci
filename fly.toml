# CRITICAL: this app is single-instance by design.
# `fly scale count 1` must be kept, and `fly machine clone` is forbidden.
# See README.md#Deployment for the invariants that break under multi-machine.
app = "zaciraci"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "diesel migration run"

[env]
  RUST_LOG = "info"
  RUST_BACKTRACE = "1"
  PG_POOL_SIZE = "10"

# CRITICAL: keep this service single-instance. `ensure_ref_storage_setup`
# relies on a process-local lock (REF_STORAGE_LOCKS); running multiple
# machines with the same ROOT_ACCOUNT_ID breaks the initial-deposit and
# top-up cap invariants. See README.md#Deployment and follow-up Issue #1.
[[services]]
  internal_port = 50051
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [services.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

    [services.ports.http_options]
      h2_backend = true

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
