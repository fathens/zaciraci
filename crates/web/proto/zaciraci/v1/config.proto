syntax = "proto3";
package zaciraci.v1;

service ConfigService {
  rpc GetAll(GetAllConfigRequest) returns (GetAllConfigResponse);
  rpc GetOne(GetOneConfigRequest) returns (GetOneConfigResponse);
  rpc Upsert(UpsertConfigRequest) returns (UpsertConfigResponse);
  rpc Delete(DeleteConfigRequest) returns (DeleteConfigResponse);
  rpc ListKeyDefinitions(ListKeyDefinitionsRequest) returns (ListKeyDefinitionsResponse);
}

message ConfigEntry {
  string key = 1;
  string value = 2;
  string instance_id = 3;
}

message GetAllConfigRequest {
  string instance_id = 1;
}

message GetAllConfigResponse {
  repeated ConfigEntry entries = 1;
}

message GetOneConfigRequest {
  string instance_id = 1;
  string key = 2;
}

message GetOneConfigResponse {
  optional string value = 1;
}

message UpsertConfigRequest {
  string instance_id = 1;
  string key = 2;
  string value = 3;
  optional string description = 4;
}

message UpsertConfigResponse {}

message DeleteConfigRequest {
  string instance_id = 1;
  string key = 2;
}

message DeleteConfigResponse {}

enum ConfigValueType {
  CONFIG_VALUE_TYPE_UNSPECIFIED = 0;
  CONFIG_VALUE_TYPE_BOOL = 1;
  CONFIG_VALUE_TYPE_U16 = 2;
  CONFIG_VALUE_TYPE_U32 = 3;
  CONFIG_VALUE_TYPE_U64 = 4;
  CONFIG_VALUE_TYPE_U128 = 5;
  CONFIG_VALUE_TYPE_I64 = 6;
  CONFIG_VALUE_TYPE_F64 = 7;
  CONFIG_VALUE_TYPE_STRING = 8;
  CONFIG_VALUE_TYPE_DURATION = 9;
}

message KeyDefinitionEntry {
  string key = 1;
  string description = 2;
  ConfigValueType value_type = 3;
  string resolved_value = 4;
}

message ListKeyDefinitionsRequest {}

message ListKeyDefinitionsResponse {
  repeated KeyDefinitionEntry definitions = 1;
}
